<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>СППУР "Адаптация"</title>
    <link rel="stylesheet" href="styles/client-main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU"></script>
    <script src="scripts/client-main.js"></script>
  </head>
  <body>
    <header>
      <nav class="head">
        <a class="logo" href="/"><h2>СППУР "Адаптация"</h2></a>
        <ul>
          <li><a class="nav-item active" href="/">Главная</a></li>
          <li><a class="nav-item" href="/graphs">Статистика и графики</a></li>
          <li><a class="nav-item" href="/prediction">Прогноз экологической ситуации</a></li>
          <li><a class="nav-item" href="/rules">Нормативная база</a></li>
          <li><a class="nav-item" href="/login">Вход</a></li>
        </ul>
      </nav>
    </header>

    <div class="container">
      <h1>Экологические показатели региона</h1>
      <div class="cards">
        <div class="card">
          <div class="card-img">
            <p class="card-value card-num">{{.AQI}}</p>
          </div>
          <p>Индекс экологического состояния региона</p>
        </div>

        <div class="card">
          <div class="card-img">
            <p class="card-value">{{.Level}}</p>
          </div>
          <p>Текущий уровень риска</p>
        </div>

        <div class="card">
          <div class="card-img">
            <p class="card-value">
              {{.Danger}}
            </p>
          </div>
          <p>Краткая аналитика</p>
        </div>

        <div class="card">
          <div id="map"></div>
          <p>Карта Тюменской области</p>
        </div>
      </div>
    </div>
  </body>
</html>
